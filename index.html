<!DOCTYPE html>
<html>

<head>
    <title>Fenmo - Expense Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }

        h1 {
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* Standardize all input and select sizes */
        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            /* Critical: keeps padding inside the width */
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            font-size: 0.9em;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        h3 {
            margin-top: 30px;
            padding: 10px 0;
            border-top: 1px solid #eee;
        }

        /* Refined Filter Container */
        #filterContainer {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #filterCategory {
            width: auto;
            /* Filters don't need to be full width */
            min-width: 160px;
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th,
        td {
            border-bottom: 1px solid #eee;
            padding: 12px 8px;
            text-align: left;
        }

        th {
            background-color: #fcfcfc;
            color: #666;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background-color: #fafafa;
        }
    </style>
</head>

<body>
    <h1>Expense Tracker</h1>

    <form id="expenseForm">
        <div class="form-group">
            <label>Amount</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="number" id="rupees" placeholder="Rs." min="0" style="flex: 2;" required>
                <span>.</span>
                <input type="number" id="paise" placeholder="00" min="0" max="99" style="flex: 1;">
            </div>
            <small style="color: #888;">Enter amount (Paise is optional)</small>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select id="category" required>
                <option value="" disabled selected>Select a Category</option>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Work">Work</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Description</label>
            <input type="text" id="description" placeholder="What was this for?" required>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" id="date" required>
        </div>

        <button type="submit">Add Expense</button>
    </form>

    <h3>Total: <span id="totalDisplay">₹ 0.00</span></h3>

    <div id="filterContainer">
        <strong>Filters:</strong>
        <select id="filterCategory">
            <option value="">All Categories</option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Work">Work</option>
            <option value="Other">Other</option>
        </select>
        <span style="color: #666; font-size: 0.8em;">Sorted by: Newest First</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="expenseTableBody"></tbody>
    </table>
    <script src="script.js"></script>
</body>

</html>
